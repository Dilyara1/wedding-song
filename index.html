<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Song</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            padding: 50px;
            text-align: center;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 2.5em;
        }

        .subtitle {
            color: #999;
            font-size: 1.1em;
            margin-bottom: 30px;
        }

        .player-container {
            background: #f9f9f9;
            padding: 30px;
            border-radius: 10px;
            margin: 30px 0;
        }

        audio {
            width: 100%;
            margin-bottom: 20px;
            cursor: pointer;
        }

        .song-title {
            color: #555;
            font-size: 1.2em;
            word-break: break-word;
        }

        .controls {
            margin-top: 30px;
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        button {
            background-color: #667eea;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 5px;
            font-size: 1em;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #764ba2;
        }

        .info {
            color: #888;
            font-size: 0.9em;
            margin-top: 20px;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>💕 Wedding Song</h1>
        <p class="subtitle">A special moment in music</p>

        <div class="player-container">
            <audio id="audioPlayer" controls>
                <source src="1723269170_ajzhan-yzym-au-men.mp3" type="audio/mpeg">
                Your browser does not support the audio element.
            </audio>
            <p class="song-title">🎵 Ajzhan Yzym Au Men</p>
        </div>

        <p class="info">
            Click play to listen to your wedding song. <br>
            Share this link with your loved ones! ❤️
        </p>
    </div>
</body>
</html>
